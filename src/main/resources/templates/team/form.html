<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko" th:replace="~{fragments/layout :: layout(${teamId != null} ? '팀 수정' : '팀 등록', ~{::content})}">
<th:block th:fragment="content">
  <div class="page-header">
    <h1 class="page-title" th:text="${teamId != null} ? '팀 수정' : '팀 등록'">팀 등록</h1>
    <a href="/teams" class="btn btn-secondary">목록</a>
  </div>
  <div class="card">
    <div class="card-body">
      <form th:action="${teamId != null} ? @{/teams/{id}(id=${teamId})} : @{/teams}" th:object="${team}" method="post">
        <div class="form-group">
          <label for="name">팀명 *</label>
          <input type="text" id="name" class="form-control" th:field="*{name}" required/>
        </div>
        <div class="form-group">
          <label for="shortName">약칭</label>
          <input type="text" id="shortName" class="form-control" th:field="*{shortName}" placeholder="예: KIA"/>
        </div>
        <div class="form-group">
          <label for="leagueId">소속 리그</label>
          <select id="leagueId" class="form-control" th:field="*{leagueId}">
            <option value="">선택 안 함</option>
            <option th:each="l : ${leagues}" th:value="${l.id}" th:text="${l.name}">리그</option>
          </select>
        </div>
        <div class="form-group">
          <label for="foundedYear">창단년도</label>
          <input type="number" id="foundedYear" class="form-control" th:field="*{foundedYear}" min="1800" max="2100" placeholder="예: 1982"/>
        </div>
        <div class="form-group">
          <label for="homeStadium">홈구장</label>
          <input type="text" id="homeStadium" class="form-control" th:field="*{homeStadium}"/>
        </div>
        <div class="form-group">
          <label for="logoUrl">로고 URL</label>
          <input type="url" id="logoUrl" class="form-control" th:field="*{logoUrl}" placeholder="https://..."/>
        </div>
        <div class="d-flex gap-1">
          <button type="submit" class="btn btn-primary" th:text="${teamId != null} ? '수정' : '등록'">등록</button>
          <a href="/teams" class="btn btn-secondary">취소</a>
        </div>
      </form>
    </div>
  </div>
</th:block>
</html>
