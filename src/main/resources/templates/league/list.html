<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko" th:replace="~{fragments/layout :: layout('리그', ~{::content})}">
<th:block th:fragment="content">
  <header class="page-header">
    <div class="page-header-top">
      <span class="page-section-label">Leagues</span>
      <h1 class="page-title t-h1">리그 <span class="page-count" th:text="|(${leagues == null ? 0 : #lists.size(leagues)}개)|">(0개)</span></h1>
    </div>
    <a href="/leagues/new" class="btn btn-primary">리그 등록</a>
  </header>
  <div class="mlb-filter-bar">
    <a href="/leagues" class="mlb-filter-reset">초기화</a>
  </div>
  <section class="card data-section">
    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>리그명</th>
            <th>국가</th>
            <th>설명</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="league : ${leagues != null ? leagues : T(java.util.Collections).emptyList()}">
            <td><a th:href="@{/leagues/{id}(id=${league.id})}" th:text="${league.name}">리그명</a></td>
            <td th:text="${league.country}">-</td>
            <td th:text="${league.description}" class="text-muted">-</td>
            <td>
              <a th:href="@{/leagues/{id}/edit(id=${league.id})}" class="btn btn-secondary btn-sm">수정</a>
            </td>
          </tr>
          <tr th:if="${leagues == null || #lists.isEmpty(leagues)}">
            <td colspan="4" class="text-muted">등록된 리그가 없습니다.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
</th:block>
</html>
