<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko" th:replace="~{fragments/layout :: layout(${gameId != null} ? '경기 수정' : '경기 등록', ~{::content})}">
<th:block th:fragment="content">
  <div class="page-header">
    <h1 class="page-title" th:text="${gameId != null} ? '경기 수정' : '경기 등록'">경기 등록</h1>
    <a href="/games" class="btn btn-secondary">목록</a>
  </div>
  <div class="card">
    <div class="card-body">
      <form th:action="${gameId != null} ? @{/games/{id}(id=${gameId})} : @{/games}" th:object="${game}" method="post">
        <div class="form-group">
          <label for="awayTeamId">원정팀 *</label>
          <select id="awayTeamId" class="form-control" th:field="*{awayTeamId}" required>
            <option value="">선택</option>
            <option th:each="t : ${teams}" th:value="${t.id}" th:text="${t.name}">팀</option>
          </select>
        </div>
        <div class="form-group">
          <label for="homeTeamId">홈팀 *</label>
          <select id="homeTeamId" class="form-control" th:field="*{homeTeamId}" required>
            <option value="">선택</option>
            <option th:each="t : ${teams}" th:value="${t.id}" th:text="${t.name}">팀</option>
          </select>
        </div>
        <div class="form-group">
          <label for="gameDateTime">경기일시 *</label>
          <input type="datetime-local" id="gameDateTime" class="form-control" th:field="*{gameDateTime}" required/>
        </div>
        <div class="form-group">
          <label class="d-flex align-items-center gap-2">
            <input type="checkbox" th:field="*{exhibition}"/>
            <span>시범 경기</span>
          </label>
        </div>
        <div class="form-group">
          <label class="d-flex align-items-center gap-2">
            <input type="checkbox" th:field="*{doubleheader}"/>
            <span>더블헤더 (2차전)</span>
          </label>
          <p class="text-muted small mb-0">체크하지 않으면 같은 날짜·같은 홈/원정(같은 리그) 경기가 이미 있으면 새로 만들지 않고 그 경기를 업데이트합니다.</p>
        </div>
        <div class="form-group">
          <label for="venue">장소</label>
          <input type="text" id="venue" class="form-control" th:field="*{venue}" placeholder="구장명"/>
        </div>
        <div class="form-group">
          <label for="awayScore">원정 득점</label>
          <input type="number" id="awayScore" class="form-control" th:field="*{awayScore}" min="0"/>
        </div>
        <div class="form-group">
          <label for="homeScore">홈 득점</label>
          <input type="number" id="homeScore" class="form-control" th:field="*{homeScore}" min="0"/>
        </div>
        <div class="form-group">
          <label for="status">상태</label>
          <select id="status" class="form-control" th:field="*{status}">
            <option th:each="s : ${statuses}" th:value="${s.name()}" th:text="${s.displayName}">상태</option>
          </select>
        </div>
        <div class="form-group">
          <label for="memo">메모</label>
          <textarea id="memo" class="form-control" th:field="*{memo}" rows="2"></textarea>
        </div>
        <fieldset class="form-group border rounded p-3 mb-3" style="border-color: var(--border-medium, #dee2e6) !important;">
          <legend class="float-none w-auto px-2 fs-6 mb-2">초·말 교대 안내 <span class="text-muted fw-normal">(별도 구역)</span></legend>
          <label for="halfInningTransitionNotes" class="form-label">교대 멘트·진행 안내</label>
          <textarea id="halfInningTransitionNotes" class="form-control" th:field="*{halfInningTransitionNotes}" rows="6"
                    placeholder="예:&#10;1회초 종료 → 1회말 한화 공격으로 전환&#10;3회말 후 장비 점검 2분&#10;(자유 형식, 줄바꿈 유지)"></textarea>
          <p class="text-muted small mb-0">
            <strong>중계</strong> 탭 맨 위에만 카드로 보입니다. 타석 목록·회초말 끝 공/교체 줄과는 <strong>섞이지 않습니다</strong>.
          </p>
        </fieldset>
        <div class="form-group">
          <label for="halfInningBreakNotes">회초·말 끝 공 / 교체 메모</label>
          <textarea id="halfInningBreakNotes" class="form-control" th:field="*{halfInningBreakNotes}" rows="5"
                    placeholder="한 줄에 한 반 이닝. 예:&#10;1초|공: 새 공 | 교체: 포수 김→이&#10;1말|교체: 대주자 출루 후 3루수 교체"></textarea>
          <p class="text-muted small mb-0">
            중계 기록 탭에서 해당 반의 <strong>마지막 타석(및 그 뒤 투수교체)</strong> 바로 다음에 표시됩니다.
            형식: <code>N초</code> 또는 <code>N말</code> 뒤에 <code>|공: 내용|교체: 내용</code> (공·교체는 생략 가능, 순서 바꿔도 됨)
          </p>
        </div>
        <div class="d-flex gap-1">
          <button type="submit" class="btn btn-primary" th:text="${gameId != null} ? '수정' : '등록'">등록</button>
          <a href="/games" class="btn btn-secondary">취소</a>
        </div>
      </form>
    </div>
  </div>
</th:block>
</html>
