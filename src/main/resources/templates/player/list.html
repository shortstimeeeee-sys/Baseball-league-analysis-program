<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko" th:replace="~{fragments/layout :: layout(${'선수 (' + #lists.size(players) + '명)'}, ~{::content})}">
<th:block th:fragment="content">
  <header class="page-header">
    <div class="page-header-top">
      <span class="page-section-label">Players</span>
      <h1 class="page-title t-h1">선수 <span class="page-count" th:text="${'(' + #lists.size(players) + '명)'}">(0명)</span></h1>
    </div>
    <div class="d-flex gap-2 align-items-center flex-wrap">
      <a href="/players/new" class="btn btn-primary">선수 등록</a>
    </div>
  </header>
  <div class="mlb-filter-bar">
    <form action="/players" method="get" class="d-flex gap-2 align-items-center flex-wrap">
      <label for="team-filter" class="mlb-filter-label">팀</label>
      <select id="team-filter" name="teamId" class="form-control mlb-filter-select" onchange="this.form.submit()">
        <option value="">전체 팀</option>
        <option th:each="t : ${teams}" th:value="${t.id}" th:text="${t.name}" th:selected="${selectedTeamId != null && selectedTeamId == t.id}">팀</option>
      </select>
    </form>
    <a th:href="@{/players}" class="mlb-filter-reset">초기화</a>
  </div>
  <section class="card data-section">
    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>이름</th>
            <th>소속팀</th>
            <th>포지션</th>
            <th class="col-num">등번호</th>
            <th class="col-num">생년월일</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="player : ${players}">
            <td><a th:href="@{/players/{id}(id=${player.id})}" th:text="${player.name}">이름</a></td>
            <td th:text="${player.team != null ? player.team.name : '-'}">-</td>
            <td th:text="${player.position != null ? player.position.displayName : '-'}">-</td>
            <td class="col-num" th:text="${player.backNumber} ?: '-'">-</td>
            <td class="col-num" th:text="${player.birthDate != null ? #temporals.format(player.birthDate, 'yyyy-MM-dd') : '-'}">-</td>
            <td>
              <a th:href="@{/players/{id}/edit(id=${player.id})}" class="btn btn-secondary btn-sm">수정</a>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(players)}">
            <td colspan="6" class="text-muted">등록된 선수가 없습니다.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
</th:block>
</html>
