<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko"
      th:replace="~{fragments/layout :: layout('시스템 오류가 발생했습니다', ~{::content})}">
<th:block th:fragment="content">
  <section class="error-page">
    <h1 class="t-h1">문제가 발생했습니다</h1>
    <p class="t-body">
      요청을 처리하는 중에 오류가 발생했습니다.<br/>
      잠시 후 다시 시도해 주세요.
    </p>
    <p class="t-body-sm t-muted" th:if="${message}" th:text="${message}"></p>
    <pre class="t-body-sm t-muted" style="margin-top:1rem; padding:0.75rem; background:#f5f5f5; border-radius:4px; overflow:auto;" th:if="${exceptionMessage}" th:text="${exceptionClass + ': ' + exceptionMessage}">exception</pre>
    <div class="error-actions">
      <a href="/" class="btn btn-primary">대시보드로 이동</a>
      <a href="/games" class="btn btn-secondary">경기 목록 보기</a>
    </div>
  </section>
</th:block>
</html>
