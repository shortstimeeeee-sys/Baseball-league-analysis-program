<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko"
      th:replace="~{fragments/layout :: layout('페이지를 찾을 수 없습니다', ~{::content})}">
<th:block th:fragment="content">
  <section class="error-page">
    <h1 class="t-h1">404 – 페이지를 찾을 수 없습니다</h1>
    <p class="t-body">
      요청하신 리소스를 찾을 수 없습니다.<br/>
      URL이 변경되었거나 삭제되었을 수 있습니다.
    </p>
    <p class="t-body-sm t-muted" th:if="${message}" th:text="${message}"></p>
    <div class="error-actions">
      <a href="/" class="btn btn-primary">대시보드로 이동</a>
      <a href="/games" class="btn btn-secondary">경기 목록 보기</a>
    </div>
  </section>
</th:block>
</html>
